<!DOCTYPE html>
<html>
<head>
    <title>AI Research Knowledge Assistant</title>

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial, sans-serif;
        }

        .box{
            width:700px;
            min-height:700px;
            margin-top:30px;
            background:white;
            border-radius:20px;
            padding:20px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            color:#0066ff;
        }

        textarea{
            width:90%;
            height:100px;
            border-radius:10px;
            padding:10px;
            font-size:16px;
        }

        button{
            margin-top:10px;
            width:150px;
            height:50px;
            border:none;
            border-radius:10px;
            background:#0066ff;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        .output{
            margin-top:20px;
            background:#f0f8ff;
            padding:15px;
            border-radius:10px;
            text-align:left;
            white-space:pre-wrap;
        }

    </style>

</head>

<body>

<center>

<div class="box">

<h1>🤖 AI Research Knowledge Assistant</h1>

<form method="POST">

<textarea
name="prompt"
placeholder="Ask about AI, Research Papers, Machine Learning, Data Science..."
required></textarea>

<br>

<button type="submit">
Ask AI
</button>

</form>

{% if message %}

<div class="output">

<h3>Response:</h3>

{{ message }}

</div>

{% endif %}

</div>

</center>

</body>
</html>
